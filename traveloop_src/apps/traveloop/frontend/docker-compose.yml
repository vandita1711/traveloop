version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: traveloop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: traveloop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - traveloop-postgres-data:/var/lib/postgresql/data

volumes:
  traveloop-postgres-data:
